<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — FriendLink</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="page-loader">
        <div><span class="loader-dot"></span><span class="loader-dot"></span><span class="loader-dot"></span></div>
    </div>

    <nav class="navbar navbar-expand-lg fl-navbar py-3">
        <div class="container">
            <a class="navbar-brand fl-brand d-flex align-items-center" href="index.html">
                <span class="fl-brand-badge">F</span> FriendLink
            </a>
            <a href="register.html" class="btn btn-fl-primary btn-sm px-3">Créer un compte</a>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="fl-form-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h1 class="h3 fw-bold">Se connecter</h1>
                        <p class="text-muted small">Retrouvez votre communauté FriendLink.</p>
                    </div>

                    <ul class="nav nav-pills nav-fill mb-4" id="login-tabs">
                        <li class="nav-item">
                            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-email" type="button">Par email</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-whatsapp" type="button">Par WhatsApp</button>
                        </li>
                    </ul>

                    <form action="members.html" class="tab-content">
                        <div class="tab-pane fade show active" id="tab-email">
                            <label class="form-label small fw-medium">Adresse e-mail</label>
                            <input type="email" class="form-control mb-3" required>
                        </div>
                        <div class="tab-pane fade" id="tab-whatsapp">
                            <label class="form-label small fw-medium">Numéro WhatsApp</label>
                            <input type="tel" class="form-control mb-3" placeholder="+229 00 00 00 00">
                        </div>

                        <label class="form-label small fw-medium">Mot de passe</label>
                        <input type="password" class="form-control mb-3" required>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label small" for="remember">Se souvenir de moi</label>
                            </div>
                            <a href="#" class="small text-decoration-underline">Mot de passe oublié ?</a>
                        </div>

                        <button type="submit" class="btn btn-fl-primary btn-lg w-100">Connexion</button>
                    </form>

                    <p class="text-center small text-muted mt-4 mb-0">
                        Pas encore de compte ? <a href="register.html" class="text-decoration-underline">S'inscrire</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/mock-data.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
